<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 225">
  <defs>
    <linearGradient id="authhub_bg" x1="0" y1="0" x2="400" y2="225" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="55%" stop-color="#312e81"/>
      <stop offset="100%" stop-color="#3730a3"/>
    </linearGradient>
    <radialGradient id="authhub_glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(120 55) scale(240)">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="400" height="225" fill="url(#authhub_bg)"/>
  <rect width="400" height="225" fill="url(#authhub_glow)"/>

  <!-- Shield + keyhole mark -->
  <g transform="translate(56,52)">
    <path d="M44 0 L88 16 V52 C88 84 68 104 44 116 C20 104 0 84 0 52 V16 Z" fill="#6366f1"/>
    <path d="M44 8 L80 21 V52 C80 79 63 96 44 107 C25 96 8 79 8 52 V21 Z" fill="#818cf8"/>
    <circle cx="44" cy="48" r="12" fill="#1e1b4b"/>
    <rect x="39" y="54" width="10" height="24" rx="5" fill="#1e1b4b"/>
    <!-- Check tick on shield edge -->
    <circle cx="82" cy="94" r="16" fill="#22c55e"/>
    <path d="M74 94 l6 6 l12 -12" stroke="#ffffff" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <text fill="#ffffff" x="185" y="95" font-family="system-ui" font-size="32" font-weight="bold">AuthHub</text>
  <text fill="#c7d2fe" x="185" y="122" font-family="system-ui" font-size="16">Reusable Authentication Service</text>
  <text fill="#a5b4fc" x="185" y="145" font-family="system-ui" font-size="10">JWT · MFA · RBAC · Spring Boot 3.5</text>
</svg>
