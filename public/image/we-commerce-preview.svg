<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 225">
  <defs>
    <linearGradient id="wec_bg" x1="0" y1="0" x2="400" y2="225" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2e1065"/>
      <stop offset="55%" stop-color="#5b21b6"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <radialGradient id="wec_glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(120 55) scale(240)">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="400" height="225" fill="url(#wec_bg)"/>
  <rect width="400" height="225" fill="url(#wec_glow)"/>

  <!-- Shopping bag mark -->
  <g transform="translate(58,62)">
    <path d="M8 24 h68 l-6 72 a8 8 0 0 1 -8 7 h-40 a8 8 0 0 1 -8 -7 Z" fill="#f8fafc" opacity="0.95"/>
    <path d="M26 24 v-6 a16 16 0 0 1 32 0 v6" fill="none" stroke="#f8fafc" stroke-width="7" stroke-linecap="round"/>
    <!-- W monogram on the bag -->
    <path d="M24 48 l7 30 l11 -22 l11 22 l7 -30" fill="none" stroke="#7c3aed" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <text fill="#ffffff" x="180" y="95" font-family="system-ui" font-size="30" font-weight="bold">We Commerce</text>
  <text fill="#ddd6fe" x="180" y="122" font-family="system-ui" font-size="13">Multi-Vendor Marketplace</text>
  <text fill="#c4b5fd" x="180" y="145" font-family="system-ui" font-size="10">Spring Boot 3 · Java 21 · Next.js · ABA Pay / KHQR</text>
</svg>
