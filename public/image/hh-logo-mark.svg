<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="hh-bg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#26235C" />
            <stop offset="42%" stop-color="#4F46E5" />
            <stop offset="78%" stop-color="#7C3AED" />
            <stop offset="100%" stop-color="#9333EA" />
        </linearGradient>
        <radialGradient id="hh-glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(30 24) scale(85)">
            <stop offset="0%" stop-color="#A5B4FC" stop-opacity="0.55" />
            <stop offset="100%" stop-color="#A5B4FC" stop-opacity="0" />
        </radialGradient>
        <linearGradient id="hh-gloss" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="rgba(255,255,255,0.28)" />
