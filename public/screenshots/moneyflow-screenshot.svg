<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg-money" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#09090b"/>
      <stop offset="100%" stop-color="#18181b"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg-money)"/>

  <!-- Browser Chrome -->
  <rect x="0" y="0" width="800" height="32" fill="#09090b"/>
  <circle cx="20" cy="16" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="16" r="6" fill="#febc2e"/>
  <circle cx="60" cy="16" r="6" fill="#28c840"/>
  <rect x="280" y="8" width="240" height="16" rx="4" fill="#18181b"/>
  <text x="400" y="20" text-anchor="middle" font-family="system-ui" font-size="9" fill="#52525b">money-flow-sigma-black.vercel.app</text>

  <!-- Decorative circles -->
  <circle cx="150" cy="150" r="200" fill="#22c55e" opacity="0.03"/>
  <circle cx="650" cy="350" r="180" fill="#3b82f6" opacity="0.03"/>
  <circle cx="400" cy="450" r="150" fill="#a855f7" opacity="0.02"/>

  <!-- Logo/Title -->
  <text x="400" y="130" text-anchor="middle" font-family="system-ui" font-size="36" fill="#fafafa" font-weight="700">Money Flow</text>
  <text x="400" y="165" text-anchor="middle" font-family="system-ui" font-size="14" fill="#71717a">Track your finances beautifully</text>

  <!-- Login Card -->
  <rect x="250" y="200" width="300" height="260" rx="16" fill="#18181b" stroke="#27272a" stroke-width="1"/>
  <text x="400" y="240" text-anchor="middle" font-family="system-ui" font-size="18" fill="#fafafa" font-weight="600">Welcome back</text>
  <text x="400" y="262" text-anchor="middle" font-family="system-ui" font-size="12" fill="#71717a">Sign in to your account</text>

  <!-- Inputs -->
  <rect x="280" y="285" width="240" height="44" rx="8" fill="#27272a" stroke="#3f3f46" stroke-width="1"/>
  <text x="295" y="312" font-family="system-ui" font-size="12" fill="#71717a">Email address</text>
  <rect x="280" y="340" width="240" height="44" rx="8" fill="#27272a" stroke="#3f3f46" stroke-width="1"/>
  <text x="295" y="367" font-family="system-ui" font-size="12" fill="#71717a">Password</text>

  <!-- Sign In Button -->
  <rect x="280" y="400" width="240" height="44" rx="8" fill="#fafafa"/>
  <text x="400" y="427" text-anchor="middle" font-family="system-ui" font-size="14" fill="#09090b" font-weight="600">Sign In</text>

  <!-- Sign Up Link -->
  <text x="330" y="470" font-family="system-ui" font-size="12" fill="#71717a">Don't have an account?</text>
  <text x="470" y="470" font-family="system-ui" font-size="12" fill="#22c55e" font-weight="500">Sign Up</text>

  <!-- Decorative Finance Cards -->
  <rect x="100" y="280" width="80" height="60" rx="8" fill="#18181b" stroke="#27272a"/>
  <circle cx="125" cy="300" r="10" fill="#22c55e" opacity="0.2"/>
  <text x="125" y="304" text-anchor="middle" font-family="system-ui" font-size="10" fill="#22c55e">↑</text>
  <text x="105" y="325" font-family="system-ui" font-size="9" fill="#71717a">Income</text>
  <text x="105" y="338" font-family="system-ui" font-size="11" fill="#22c55e" font-weight="500">+$2,450</text>

  <rect x="620" y="280" width="80" height="60" rx="8" fill="#18181b" stroke="#27272a"/>
  <circle cx="645" cy="300" r="10" fill="#ef4444" opacity="0.2"/>
  <text x="645" y="304" text-anchor="middle" font-family="system-ui" font-size="10" fill="#ef4444">↓</text>
  <text x="625" y="325" font-family="system-ui" font-size="9" fill="#71717a">Expense</text>
  <text x="625" y="338" font-family="system-ui" font-size="11" fill="#ef4444" font-weight="500">-$1,230</text>

  <rect x="100" y="360" width="80" height="60" rx="8" fill="#18181b" stroke="#27272a"/>
  <circle cx="125" cy="380" r="10" fill="#3b82f6" opacity="0.2"/>
  <text x="125" y="384" text-anchor="middle" font-family="system-ui" font-size="10" fill="#3b82f6">≡</text>
  <text x="105" y="405" font-family="system-ui" font-size="9" fill="#71717a">Balance</text>
  <text x="105" y="418" font-family="system-ui" font-size="11" fill="#3b82f6" font-weight="500">$1,220</text>

  <rect x="620" y="360" width="80" height="60" rx="8" fill="#18181b" stroke="#27272a"/>
  <text x="625" y="380" font-family="system-ui" font-size="9" fill="#71717a">This week</text>
  <polyline points="630,415 645,405 655,410 670,395 690,400" fill="none" stroke="#22c55e" stroke-width="2" stroke-linecap="round"/>

  <!-- Brand circles -->
  <circle cx="370" cy="485" r="8" fill="#22c55e"/>
  <circle cx="400" cy="485" r="8" fill="#ef4444"/>
  <circle cx="430" cy="485" r="8" fill="#3b82f6"/>
</svg>
