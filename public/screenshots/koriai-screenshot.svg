<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <clipPath id="rounded">
      <rect x="0" y="0" width="800" height="500" rx="12"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)" clip-path="url(#rounded)"/>

  <!-- Browser Chrome -->
  <rect x="0" y="0" width="800" height="32" fill="#0c1222"/>
  <circle cx="20" cy="16" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="16" r="6" fill="#febc2e"/>
  <circle cx="60" cy="16" r="6" fill="#28c840"/>
  <rect x="300" y="8" width="200" height="16" rx="4" fill="#1e293b"/>
  <text x="400" y="20" text-anchor="middle" font-family="system-ui" font-size="9" fill="#64748b">koriai-frontend.vercel.app</text>

  <!-- Nav -->
  <rect x="24" y="48" width="80" height="28" rx="6" fill="#1e293b"/>
  <text x="64" y="66" text-anchor="middle" font-family="system-ui" font-size="11" fill="#22d3ee" font-weight="600">KoriAI</text>
  <rect x="720" y="52" width="60" height="24" rx="6" fill="#22d3ee"/>
  <text x="750" y="68" text-anchor="middle" font-family="system-ui" font-size="10" fill="#0f172a" font-weight="600">Get started</text>

  <!-- Hero Section -->
  <text x="50" y="130" font-family="system-ui" font-size="11" fill="#a855f7" font-weight="500">Next-Gen Language Learning</text>
  <text x="50" y="175" font-family="system-ui" font-size="32" fill="#f8fafc" font-weight="700">Master Korean</text>
  <text x="50" y="215" font-family="system-ui" font-size="32" fill="#f8fafc" font-weight="700">with AI precision.</text>
  <text x="50" y="260" font-family="system-ui" font-size="13" fill="#94a3b8">Practice conversation, refine your writing, and build</text>
  <text x="50" y="280" font-family="system-ui" font-size="13" fill="#94a3b8">vocabulary with an AI tutor designed to feel like a native.</text>

  <!-- CTA Buttons -->
  <rect x="50" y="310" width="140" height="40" rx="8" fill="#22d3ee"/>
  <text x="120" y="335" text-anchor="middle" font-family="system-ui" font-size="12" fill="#0f172a" font-weight="600">Start learning free</text>
  <rect x="205" y="310" width="130" height="40" rx="8" fill="none" stroke="#475569" stroke-width="1"/>
  <text x="270" y="335" text-anchor="middle" font-family="system-ui" font-size="12" fill="#94a3b8">Open dashboard</text>

  <!-- Feature Pills -->
  <rect x="50" y="370" width="100" height="26" rx="13" fill="#1e293b"/>
  <text x="100" y="387" text-anchor="middle" font-family="system-ui" font-size="10" fill="#94a3b8">Instant Feedback</text>
  <rect x="160" y="370" width="110" height="26" rx="13" fill="#1e293b"/>
  <text x="215" y="387" text-anchor="middle" font-family="system-ui" font-size="10" fill="#94a3b8">Natural Phrasing</text>
  <rect x="280" y="370" width="95" height="26" rx="13" fill="#1e293b"/>
  <text x="328" y="387" text-anchor="middle" font-family="system-ui" font-size="10" fill="#94a3b8">Mobile Ready</text>

  <!-- Chat Preview Card -->
  <rect x="480" y="100" width="280" height="300" rx="16" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <rect x="500" y="120" width="240" height="40" rx="8" fill="#334155"/>
  <circle cx="525" cy="140" r="12" fill="#22d3ee"/>
  <text x="525" y="144" text-anchor="middle" font-family="system-ui" font-size="10" fill="#0f172a" font-weight="600">AI</text>
  <text x="550" y="135" font-family="system-ui" font-size="11" fill="#f8fafc" font-weight="500">KoriAI Tutor</text>
  <text x="550" y="150" font-family="system-ui" font-size="9" fill="#22c55e">● Always online</text>

  <!-- Chat Messages -->
  <rect x="540" y="175" width="200" height="35" rx="12" fill="#3b82f6"/>
  <text x="640" y="197" text-anchor="middle" font-family="system-ui" font-size="10" fill="white">I want to practice ordering coffee</text>
  <rect x="500" y="220" width="240" height="65" rx="12" fill="#334155"/>
  <text x="515" y="242" font-family="system-ui" font-size="10" fill="#f8fafc">Try: "아이스 아메리카노 한 잔</text>
  <text x="515" y="258" font-family="system-ui" font-size="10" fill="#f8fafc">주세요." — Want me to break</text>
  <text x="515" y="274" font-family="system-ui" font-size="10" fill="#f8fafc">down the grammar?</text>
  <rect x="590" y="295" width="150" height="30" rx="12" fill="#3b82f6"/>
  <text x="665" y="314" text-anchor="middle" font-family="system-ui" font-size="10" fill="white">Yes please!</text>
  <rect x="500" y="335" width="240" height="45" rx="12" fill="#334155"/>
  <text x="515" y="355" font-family="system-ui" font-size="10" fill="#22d3ee">주세요</text>
  <text x="555" y="355" font-family="system-ui" font-size="10" fill="#94a3b8">is the polite form of</text>
  <text x="515" y="370" font-family="system-ui" font-size="10" fill="#94a3b8">주다 (to give). Means "please give"</text>

  <!-- Decorative orbs -->
  <circle cx="700" cy="80" r="100" fill="#22d3ee" opacity="0.1"/>
  <circle cx="720" cy="420" r="80" fill="#8b5cf6" opacity="0.1"/>
</svg>
